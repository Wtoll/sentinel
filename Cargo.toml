[package]
name = "sentinel"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18.1", features = ["dynamic_linking", "debug"] }
bevy_rapier2d = { version = "0.33.0", features= ["simd-stable", "debug-render-2d"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
